<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title></title>
</head>
<body>
    <header>
        <div style="text-align:center">
            <i aria-hidden="true"></i>
            <h3 style="color: #131212;">
                &nbsp;&nbsp;&nbsp;&nbsp;#isPaid# Invoice List
                <span style="color: #131212;">&nbsp;&nbsp;&nbsp; #startDate# To #endDate# </span>
            </h3>
        </div>
    </header>
    <div id="InvoiceDue" *ngIf="isGenerateDataIn">
        <table class="table1" style="border-collapse:collapse;border-spacing:10px;border:1px solid black;" width="100%" cellpadding="10" cellspacing="10">
            <thead>
                <tr>
                    <th style="border:1px solid black;color:#131212;text-align:left">Sl.</th>
                    <th style="border:1px solid black;color:#131212;text-align:left">Client</th>
                    <th style="border:1px solid black;color:#131212;text-align:left">Client ID</th>
                    <th style="border:1px solid black;color:#131212;text-align:left">Invoice No.</th>
                    <th style="border:1px solid black;color:#131212;text-align:left">Remarks</th>
                    <th style="border:1px solid black;color:#131212;text-align:right;">Total Amount</th>
                    <th style="border:1px solid black;color:#131212;text-align:right">Due</th>
                    <th style="border:1px solid black;color:#131212;text-align:right">Request Amount</th>
                    <th style="border:1px solid black;color:#131212;text-align:left">Invoice Date</th>
                    <th style="border:1px solid black;color:#131212;text-align:left">Status</th>
                </tr>
            </thead>
            <tbody>
                #TRs#
            </tbody>
            <tfoot class="text-c-green">
                <tr>
                    <th></th>
                    <th></th>
                    <th></th>
                    <th></th>
                    <th></th>
                    <th style="text-align:right">#TotalAmount#</th>
                    <th style="text-align:right">#TotalDueAmount#</th>
                    <th></th>
                    <th></th>
                    <th></th>
                </tr>
            </tfoot>
        </table>
    </div>
</body>
</html>
